<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#FFB2E4" stroke-width="1"/>

  <!-- Cross hairs -->
  <line x1="16" y1="3" x2="16" y2="8" stroke="#FFB2E4" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="16" y2="29" stroke="#FFB2E4" stroke-width="1" stroke-linecap="round"/>
  <line x1="3" y1="16" x2="8" y2="16" stroke="#FFB2E4" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="29" y2="16" stroke="#FFB2E4" stroke-width="1" stroke-linecap="round"/>

  <!-- Rotating aperture blades -->
  <g transform-origin="16 16">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 16 16"
      to="360 16 16"
      dur="8s"
      repeatCount="indefinite"/>
    <circle cx="16" cy="9" r="1.5" fill="#FFB2E4" opacity="0.9"/>
    <circle cx="21.2" cy="11.5" r="1.5" fill="#FFB2E4" opacity="0.6"/>
    <circle cx="21.2" cy="20.5" r="1.5" fill="#FFB2E4" opacity="0.3"/>
    <circle cx="16" cy="23" r="1.5" fill="#FFB2E4" opacity="0.6"/>
    <circle cx="10.8" cy="20.5" r="1.5" fill="#FFB2E4" opacity="0.9"/>
    <circle cx="10.8" cy="11.5" r="1.5" fill="#FFB2E4" opacity="0.6"/>
  </g>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#FFB2E4"/>
</svg>
